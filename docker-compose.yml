version: "3.9"

# NexusOps — 100% free stack (Groq + GitHub API + SQLite + LangGraph)

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexusops-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nexusops-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_data:

networks:
  default:
    name: nexusops-network
